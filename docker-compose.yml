version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-core-service
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - AGENT_CORE_SERVER_HOST=0.0.0.0
      - AGENT_CORE_SERVER_PORT=8002
      - AGENT_CORE_DATABASE_HOST=postgres
      - AGENT_CORE_DATABASE_PORT=5432
      - AGENT_CORE_DATABASE_USER=postgres
      - AGENT_CORE_DATABASE_PASSWORD=postgres
      - AGENT_CORE_DATABASE_DBNAME=agent_core_db
      - AGENT_CORE_DATABASE_SSLMODE=disable
      - AGENT_CORE_REDIS_HOST=redis
      - AGENT_CORE_REDIS_PORT=6379
      - AGENT_CORE_KAFKA_BROKERS=kafka:9092
    networks:
      - agent-core-network

  postgres:
    image: postgres:17-alpine
    container_name: agent-core-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_core_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agent-core-network

  redis:
    image: redis:7-alpine
    container_name: agent-core-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agent-core-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: agent-core-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - agent-core-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: agent-core-kafka
    depends_on:
      - zookeeper
    ports:
      - "9094:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - agent-core-network

volumes:
  postgres_data:
  redis_data:

networks:
  agent-core-network:
    driver: bridge
